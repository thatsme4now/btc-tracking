# inmemory  \u2192 H2 in-memory (no persistence, data lost on restart)
# h2file    \u2192 H2 file-based (data stored in ./depot-data.mv.db next to JAR)
# mysql     \u2192 MySQL/MariaDB (configure spring.datasource.* below)
depot.db=h2file

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/depot
spring.datasource.username=first
spring.datasource.password=first
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Server
server.port=8080
